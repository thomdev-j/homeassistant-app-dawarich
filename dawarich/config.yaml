name: Dawarich
version: "1.3.3-33"
slug: dawarich
description: Self-hosted location tracking — Google Timeline alternative
url: https://github.com/thomdev-j/homeassistant-addon-dawarich
arch:
  - aarch64
  - amd64
init: false
startup: application
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:map-marker-path
panel_title: Dawarich
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Dawarich Web UI
map:
  - type: share
    read_only: false
  - type: backup
    read_only: false
tmpfs: true
timeout: 300
backup_pre: /usr/share/dawarich/backup_pre.sh
backup_post: /usr/share/dawarich/backup_post.sh
backup_exclude:
  - postgres/**
options:
  database_password: "dawarich"
  secret_key_base: ""
  time_zone: "Europe/Vienna"
  application_hosts: "homeassistant.local,localhost"
  background_processing_concurrency: 5
  admin_email: "admin@dawarich.local"
  admin_password: "changeme"
  ha_tracked_entities: ""
  ha_polling_interval: 30
  ha_polling_interval_stationary: 300
schema:
  database_password: str
  secret_key_base: str
  time_zone: str
  application_hosts: str
  background_processing_concurrency: "int(1,20)"
  admin_email: str
  admin_password: str
  ha_tracked_entities: str
  ha_polling_interval: "int(5,3600)"
  ha_polling_interval_stationary: "int(30,3600)"
  photon_api_host: str?
  geoapify_api_key: str?
